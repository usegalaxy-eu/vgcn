---
- name: Debug kernel version
  hosts: generic
  tasks:
    - name: Retrieve kernel version
      ansible.builtin.shell:
        cmd: uname -r
      register: kernel
      changed_when: false

    - name: Print kernel version
      ansible.builtin.debug:
        msg: "{{ kernel }}"

- name: Manage package repositories and system updates
  hosts: generic
  roles:
    - role: usegalaxy_eu.rocky_security_repository
      vars:
        rocky_security_repository_repo_definitions_upgrade: true
      become: true
    - geerlingguy.repo-epel # Install EPEL
    - usegalaxy-eu.autoupdates # keep all of our packages up to date REMOVED until latest kernel is supported in dnbd3
  tasks:
    - name: system update (without kernel update)
      ansible.builtin.dnf:
        name: "*"
        exclude:
          - kernel*
          - kmod-kvdo
        state: latest

- hosts: generic
  vars:
    software_groups_to_install:
      - admin
      - editors
      - terminals
      - utils
  pre_tasks:
    - name: Ensure group Galaxy exists with correct gid
      ansible.builtin.group:
        name: galaxy
        state: present
        gid: 999
    - name: Add the user Galxy
      ansible.builtin.user:
        name: galaxy
        uid: 999
        group: galaxy
    - name: Put SELinux in permissive mode, logging actions that would be blocked.
      ansible.posix.selinux:
        policy: targeted
        state: permissive
    - name: Enable firewalld service
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started
    - name: Create Staponpriv user homedir, see issue 23
      become: true
      ansible.builtin.file:
        path: /var/lib/stapunpriv
        state: directory
        owner: root
        group: root
  roles:
    - role: usegalaxy_eu.handy.os_setup
      vars:
        enable_create_user: true
        enable_powertools: true
        enable_install_software: true
        enable_grub: true
        enable_kernel_5: "{{ true if (ansible_facts['distribution_major_version'] < '9') else false }}"

    #- usegalaxy-eu.ffmpeg # Uncommnet this to fix https://github.com/usegalaxy-eu/issues/issues/550 
    - usegalaxy-eu.dynmotd
    - influxdata.chrony
    - usegalaxy-eu.telegraf
