---
- hosts: workers
  vars_files:
    - "group_vars/all.yml"
    - "group_vars/pulsar.yml"
    - "group_vars/condor.yml"
    - "group_vars/gpu.yml"
  pre_tasks:
    - name: Debug Kernel version
      ansible.builtin.shell:
        cmd: uname -r
      register: kernel
    - name: Print kernel version
      ansible.builtin.debug:
        msg: "{{ kernel }}"
    - name: Install Pulsar dependencies
      package:
        name:
          - gcc
          - curl
          - git
          - libcurl-devel
          - python-devel
        state: present
      become: true
      when: ansible_os_family == 'RedHat' and ansible_distribution_major_version | int >= 9
    - name: Set default version of Python
      ansible.builtin.alternatives:
        name: python
        path: /usr/bin/python3
        link: /usr/bin/python
    - name: Put SELinux in permissive mode, logging actions that would be blocked.
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: SELINUX=permissive
    # CHECK IF THIS IS NEEDED OR EXECUTED
    - name: "Deploy docker-stop-1M script"
      ansible.builtin.copy:
        content: |
            #!/bin/bash
            docker ps -f status=running --format '{{ '{{' }}.ID}}: {{ '{{' }}.RunningFor}}' | awk '/months/ && $2 > 1 { print $0 }'|cut -f1 -d':' | xargs docker stop
        dest: /usr/bin/docker-stop-1M
        owner: root
        group: root
        mode: 0755
    - name: Ensure the HTCondor configuration directory exists.
      become: true
      ansible.builtin.file:
        path: /etc/condor
        state: directory
        owner: root
        group: root
        mode: "0755"
    - name: Condor walltime script
      ansible.builtin.copy:
        dest: /etc/condor/meta_walltime.py
        src: meta_walltime.py
        mode: "0755"
    - name: Create Staponpriv user homedir, see issue 23
      become: true
      ansible.builtin.file:
        path: /var/lib/stapunpriv
        state: directory
        owner: root
        group: root
  post_tasks:
    - name: Add firewall rules for NFS
      ansible.posix.firewalld:
        service: "{{ item }}"
        state: enabled
        permanent: true
        immediate: true
      with_items:
        - nfs
        - rpc-bind
        - mountd
    - name: Open Port for HTCondor
      ansible.posix.firewalld:
        port: "{{ htcondor_server_port }}/tcp"
        state: enabled
        permanent: true
        immediate: true
    - name: Restart Autofs
      ansible.builtin.service:
        name: autofs
        state: restarted
    - name: Post Task Create User and add galaxy and condor/docker user groups
      ansible.builtin.user:
        name: galaxy
        groups: condor,docker
        append: yes
        #  Let's keep this here as a reminder that uninstalling something
        #  because we think it MAY not be needed, can result in several hours
        #  debugging. This task removed the nvidia driver and cuda.
        #  - ansible.builtin.dnf:
        #      name: "{{ packages }}"
        #      state: absent
        #    vars:
        #      packages:
        #        - libcurl-devel
        #        - openssl-devel
        #    become: yes
    - name: Ensure Docker directory extists
      file:
        state: directory
        path: /etc/docker
        mode: '0755'
    - name: Copy Docker daemon.json
      ansible.builtin.copy:
        src: daemon.json
        dest: /etc/docker/daemon.json
        mode: '0644'
    - name: Restart Docker service, in all cases
      ansible.builtin.service:
        name: docker
        state: restarted
    - name: Deploy a signal emitter for telegraf
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          echo '{"alive":1}'
        dest: /bin/iamalive
        owner: telegraf
        group: telegraf
        mode: 0755
  roles:
    - role: usegalaxy_eu.handy.os_setup
      vars:
        enable_pam_limits: true
        enable_journald: true
        enable_ansible_root_cron: true

    - usegalaxy-eu.autofs

    - geerlingguy.java
    - geerlingguy.docker

    - galaxyproject.cvmfs
    - galaxyproject.pulsar
    - usegalaxy_eu.cuda
    - usegalaxy_eu.nvidia_container

    - usegalaxy-eu.logrotate

    # Applies a 250GB soft and 1TB hard limit on the file size for the condor systemd unit
    - role: usegalaxy-eu.fslimit
      become: yes
      vars:
        ulimit_fsize_unit: "condor.service"
        ulimit_fsize_soft: 268435456000
        ulimit_fsize_hard: 1073741824000
