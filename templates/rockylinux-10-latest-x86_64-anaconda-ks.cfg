eula --agreed
network --bootproto=dhcp --device=link --activate
text
reboot
url --url=https://ftp.fau.de/rockylinux/10/BaseOS/x86_64/os/
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone Europe/Berlin --utc
firstboot --disable
zerombr
clearpart --all --initlabel --drives=vda
bootloader --location=mbr --boot-drive=vda --append="console=ttyS0,115200n8 console=tty0"
part biosboot --fstype="biosboot" --ondisk=vda --size=1
part /boot    --fstype="xfs"     --ondisk=vda --size=1024
part /        --fstype="xfs"     --ondisk=vda --grow --label=system

%packages
@core
@^minimal install
kexec-tools
cloud-init
cloud-utils-growpart
%end

%pre --interpreter=/usr/libexec/platform-python
import shlex, crypt
arg = 'rootpw='
with open('/proc/cmdline', 'r') as f:
  kcl = f.read().split()
passwords = [x[len(arg):] for x in kcl if x.startswith(arg)]
if len(passwords) == 1:
  kclpass = passwords[0]
hash = crypt.crypt(kclpass, crypt.mksalt(crypt.METHOD_SHA512))
with open('/tmp/setup-root-pass', 'w') as f:
  f.write('rootpw --allow-ssh --iscrypted ' + hash)
%end

%include /tmp/setup-root-pass

%post --erroronfail
grubby --update-kernel=ALL --args="console=ttyS0,115200n8 console=tty0"

cat > /etc/ssh/sshd_config.d/01-permit-root.conf <<EOF
PermitRootLogin yes
PasswordAuthentication yes
EOF
chmod 600 /etc/ssh/sshd_config.d/01-permit-root.conf
systemctl enable sshd
%end
